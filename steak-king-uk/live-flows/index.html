<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="utf-8">
<title>Steak King UK — Live Email Flows</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --bg:#f5f3ee;--ink:#1a1a1a;--ink-soft:#444;--muted:#888;
    --line:#e2dfd6;--card:#fff;--accent:#c41e3a;--accent-soft:#fef0f2;
    --trigger:#1a1a1a;--delay:#fff7d6;--delay-ink:#7a5e00;
    --branch:#eef4ff;--branch-ink:#1e40af;--branch-border:#c6d4f5;
    --abtest:#f3e8ff;--abtest-ink:#6b21a8;--abtest-border:#d8b4fe;
  }
  *{box-sizing:border-box}
  body,html{margin:0;padding:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  .layout{display:grid;grid-template-columns:320px 1fr;height:100vh}
  .sidebar{background:#1a1a1a;color:#f5f3ee;overflow-y:auto;border-right:1px solid #000}
  .brand{padding:22px 22px 18px;border-bottom:1px solid #333}
  .brand h1{margin:0;font-size:17px;font-weight:700;letter-spacing:-.01em}
  .brand .sub{font-size:11.5px;color:#aaa;margin-top:4px}
  .stats{padding:14px 22px;background:#0d0d0d;border-bottom:1px solid #333;font-size:11.5px;color:#bdbdbd}
  .stats b{color:#f5f3ee}
  .flows-list{padding:14px 12px 40px;display:flex;flex-direction:column;gap:4px}
  .flow-item{padding:12px 14px;border-radius:8px;cursor:pointer;transition:background .12s;border:1px solid transparent}
  .flow-item:hover{background:#2a2a2a}
  .flow-item.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .flow-item-name{font-size:13.5px;font-weight:600;line-height:1.3}
  .flow-item-meta{font-size:11px;color:#999;margin-top:3px}
  .flow-item.active .flow-item-meta{color:#ffd0d6}
  .main{position:relative;background:radial-gradient(circle at 20px 20px,#d8d4cc 1px,transparent 1px);background-size:24px 24px;overflow:auto;height:100vh}
  .canvas-header{position:sticky;top:0;background:rgba(245,243,238,.97);backdrop-filter:blur(10px);padding:18px 32px 14px;border-bottom:1px solid var(--line);z-index:10}
  .canvas-header h2{margin:0;font-size:20px;font-weight:700;letter-spacing:-.01em}
  .canvas-header .sub{font-size:12px;color:var(--muted);margin-top:3px}
  .canvas-header .profile-filter{font-size:11px;color:#7a5e00;background:#fff7d6;padding:6px 10px;border-radius:6px;margin-top:8px;display:inline-block;border:1px solid #f0e4a8}
  .canvas{padding:36px 32px 80px;display:flex;flex-direction:column;align-items:center;min-width:max-content}
  /* Generic node wrapper */
  .seq{display:flex;flex-direction:column;align-items:center;gap:0}
  .connector{width:2px;height:34px;background:#aaa}
  /* Trigger card */
  .trigger{background:var(--trigger);color:#fff;padding:14px 22px;border-radius:10px;min-width:300px;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.15)}
  .trigger-label{font-size:10.5px;color:#aaa;text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:5px}
  .trigger-name{font-size:14.5px;font-weight:700}
  /* Email card */
  .email-card{background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:14px 18px;min-width:340px;max-width:420px;cursor:pointer;transition:all .15s;box-shadow:0 2px 8px rgba(0,0,0,.04)}
  .email-card:hover{border-color:var(--accent);box-shadow:0 6px 18px rgba(196,30,58,.15);transform:translateY(-1px)}
  .email-tag{display:inline-block;background:var(--accent-soft);color:var(--accent);font-size:10px;text-transform:uppercase;letter-spacing:.06em;font-weight:700;padding:3px 8px;border-radius:4px;margin-bottom:8px}
  .email-tag.ab{background:var(--abtest);color:var(--abtest-ink);margin-left:5px}
  .email-name{font-size:13.5px;font-weight:700;margin:0 0 4px;color:var(--ink)}
  .email-subject{font-size:12.5px;color:var(--ink-soft);line-height:1.4;margin-bottom:8px}
  .email-cta{font-size:11px;color:var(--accent);font-weight:600;display:flex;align-items:center;gap:4px}
  /* Delay pill */
  .delay-pill{background:var(--delay);color:var(--delay-ink);padding:7px 14px;border-radius:20px;font-size:11.5px;font-weight:600;display:inline-flex;align-items:center;gap:6px;border:1px solid #f0e4a8}
  /* Split */
  .split-node{background:var(--branch);color:var(--branch-ink);border:1.5px solid var(--branch-border);padding:11px 18px;border-radius:8px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:8px;max-width:520px;text-align:center}
  .split-condition{font-size:11px;font-weight:500;opacity:.85;margin-top:3px;display:block}
  .branches{display:flex;gap:36px;align-items:flex-start;padding-top:24px;position:relative}
  .branches::before{content:"";position:absolute;top:0;left:50%;width:2px;height:24px;background:#aaa;transform:translateX(-50%)}
  .branch-col{display:flex;flex-direction:column;align-items:center;position:relative;padding-top:14px;min-width:340px}
  .branch-col::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:#aaa}
  .branches > .branch-col:first-child::before{left:50%}
  .branches > .branch-col:last-child::before{right:50%}
  .branches > .branch-col:only-child::before{display:none}
  .branch-label{background:#fff;border:1px solid var(--branch-border);color:var(--branch-ink);font-size:11px;font-weight:700;padding:6px 14px;border-radius:14px;margin-bottom:18px;white-space:nowrap;max-width:340px;overflow:hidden;text-overflow:ellipsis}
  .branch-label.yes{background:#dcfce7;border-color:#bbf7d0;color:#166534}
  .branch-label.no{background:#fee2e2;border-color:#fecaca;color:#991b1b}
  .end-cap{margin-top:14px;background:#e8e4dc;color:#888;font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;font-weight:700;padding:6px 12px;border-radius:14px}
  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:none;align-items:center;justify-content:center;padding:40px}
  .modal-overlay.open{display:flex}
  .modal{background:#e8e4dc;width:100%;max-width:780px;max-height:92vh;border-radius:12px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.4)}
  .modal-header{background:#fff;padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;gap:14px}
  .modal-meta{flex:1;min-width:0}
  .modal-flow{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:700}
  .modal-name{font-size:15px;font-weight:700;margin:2px 0 6px}
  .modal-subject{font-size:12.5px;color:var(--ink-soft);line-height:1.4}
  .modal-subject .lbl{color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;margin-right:5px;display:block;margin-bottom:2px}
  .modal-actions{display:flex;gap:6px;flex:none}
  .btn{font-size:11.5px;font-weight:600;background:var(--ink);color:#fff;border:0;padding:7px 12px;border-radius:6px;cursor:pointer;text-decoration:none;display:inline-block}
  .btn-ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn-close{background:transparent;color:var(--muted);font-size:22px;line-height:1;padding:0 6px;cursor:pointer;border:0}
  .modal-body{flex:1;overflow-y:auto;padding:22px;background:#e8e4dc;display:flex;justify-content:center}
  .device{background:#fff;width:100%;max-width:640px;box-shadow:0 6px 30px rgba(0,0,0,.10);border-radius:8px;overflow:hidden}
  iframe{width:100%;border:0;display:block;background:#fff;min-height:1200px}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <h1>Steak King UK</h1>
      <div class="sub">Live email flows · June 2026</div>
    </div>
    <div class="stats" id="stats">Loading…</div>
    <div class="flows-list" id="flows-list"></div>
  </aside>
  <main class="main">
    <div class="canvas-header">
      <h2 id="flow-title">Select a flow</h2>
      <div class="sub" id="flow-sub">Choose a flow from the sidebar to view its structure</div>
      <div class="profile-filter" id="profile-filter" style="display:none"></div>
    </div>
    <div class="canvas" id="canvas"></div>
  </main>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-meta">
        <div class="modal-flow" id="modal-flow"></div>
        <div class="modal-name" id="modal-name"></div>
        <div class="modal-subject"><span class="lbl">Subject</span><span id="modal-subject"></span></div>
      </div>
      <div class="modal-actions">
        <a class="btn-ghost btn" id="modal-open" target="_blank">Open in new tab</a>
        <a class="btn" id="modal-download" download>Download</a>
        <button class="btn-close" onclick="closeModal()" aria-label="Close">×</button>
      </div>
    </div>
    <div class="modal-body"><div class="device"><iframe id="modal-frame" loading="lazy"></iframe></div></div>
  </div>
</div>

<script>
let DATA = null;

fetch('flow-graph.json').then(r => r.json()).then(d => { DATA = d; renderSidebar(); });

function countEmails(nodes){
  let n = 0;
  for (const x of nodes){
    if (x.kind === 'email' || x.kind === 'abtest_email') n++;
    else if (x.kind === 'split') x.branches.forEach(b => n += countEmails(b.nodes));
  }
  return n;
}

function renderSidebar(){
  const list = document.getElementById('flows-list');
  const total = DATA.flows.reduce((s,f) => s + countEmails(f.tree), 0);
  document.getElementById('stats').innerHTML = `<b>${DATA.flows.length} live flows</b> · <b>${total} live emails</b>`;
  list.innerHTML = '';
  DATA.flows.forEach((f, idx) => {
    const n = countEmails(f.tree);
    const el = document.createElement('div');
    el.className = 'flow-item';
    el.dataset.idx = idx;
    el.innerHTML = `<div class="flow-item-name">${escapeHtml(f.name)}</div>
                    <div class="flow-item-meta">${n} email${n!==1?'s':''} · ${escapeHtml(f.trigger.label)}</div>`;
    el.addEventListener('click', () => selectFlow(idx));
    list.appendChild(el);
  });
  selectFlow(0);
}

function selectFlow(idx){
  document.querySelectorAll('.flow-item').forEach(el => el.classList.toggle('active', +el.dataset.idx === idx));
  const f = DATA.flows[idx];
  document.getElementById('flow-title').textContent = f.name;
  document.getElementById('flow-sub').textContent = `${f.trigger.label} · ${countEmails(f.tree)} emails`;
  const pf = document.getElementById('profile-filter');
  if (f.profile_filter_summary){
    pf.style.display = 'inline-block';
    pf.textContent = '⛔ Profile filter: ' + f.profile_filter_summary;
  } else { pf.style.display = 'none'; }
  renderCanvas(f);
}

function renderCanvas(flow){
  const c = document.getElementById('canvas');
  c.innerHTML = '';
  c.appendChild(triggerNode(flow.trigger));
  c.appendChild(connector());
  renderSequence(c, flow.tree, flow.name);
}

function renderSequence(parent, seq, flowName){
  seq.forEach((node, i) => {
    parent.appendChild(renderNode(node, flowName));
    // Connector between nodes — but not after splits (their branches handle their own flow)
    const isLast = i === seq.length - 1;
    if (node.kind !== 'split'){
      parent.appendChild(connector());
    }
    if (isLast && node.kind !== 'split'){
      const end = document.createElement('div');
      end.className = 'end-cap';
      end.textContent = '— Exit —';
      parent.appendChild(end);
    }
  });
}

function renderNode(node, flowName){
  if (node.kind === 'email' || node.kind === 'abtest_email'){
    return emailCard(node, flowName, node.kind === 'abtest_email');
  } else if (node.kind === 'delay'){
    const d = document.createElement('div');
    d.className = 'delay-pill';
    d.innerHTML = `<span>⏱</span> Wait ${escapeHtml(node.label)}`;
    return d;
  } else if (node.kind === 'split'){
    return splitNode(node, flowName);
  } else {
    const u = document.createElement('div');
    u.className = 'delay-pill';
    u.style.background='#fee';
    u.textContent = `Unknown: ${node.kind || ''}`;
    return u;
  }
}

function splitNode(node, flowName){
  const wrap = document.createElement('div');
  wrap.className = 'seq';
  const lbl = document.createElement('div');
  lbl.className = 'split-node';
  const cond = node.condition || '';
  const t = node.split_type === 'trigger' ? 'Trigger split' : 'Conditional split';
  lbl.innerHTML = `<span>⇆ ${t}</span><span class="split-condition">${escapeHtml(cond)}</span>`;
  wrap.appendChild(lbl);
  const br = document.createElement('div');
  br.className = 'branches';
  // For each branch, render only non-empty
  const nonEmpty = node.branches.filter(b => b.nodes.length > 0);
  if (nonEmpty.length === 0){
    const end = document.createElement('div');
    end.className = 'end-cap';
    end.textContent = '— Exit (both branches empty) —';
    wrap.appendChild(end);
    return wrap;
  }
  nonEmpty.forEach(b => {
    const col = document.createElement('div');
    col.className = 'branch-col';
    const blbl = document.createElement('div');
    blbl.className = 'branch-label ' + (b.value ? 'yes' : 'no');
    // Smart label: use destination email's "category" if obvious
    let label = b.value ? 'Yes' : 'No';
    // Try to derive a more descriptive label
    if (b.nodes.length === 1 && b.nodes[0].kind === 'email'){
      const ename = b.nodes[0].name;
      const m = ename.match(/(Beef|Pork|Lamb|Seafood|Poultry|General|Existing|Non-Customer|TIER-?\d+|Tier-?\d+)/i);
      if (m){ label = m[1]; }
    }
    if (b.value === true && node.condition && node.split_type === 'conditional'){
      label = 'Yes';
    }
    blbl.textContent = label;
    col.appendChild(blbl);
    const inner = document.createElement('div');
    inner.className = 'seq';
    renderSequence(inner, b.nodes, flowName);
    col.appendChild(inner);
    br.appendChild(col);
  });
  wrap.appendChild(br);
  return wrap;
}

function emailCard(node, flowName, isAB){
  const card = document.createElement('div');
  card.className = 'email-card';
  card.innerHTML = `<div>
                      <span class="email-tag">Send Email</span>${isAB ? '<span class="email-tag ab">A/B Test</span>' : ''}
                    </div>
                    <div class="email-name">${escapeHtml(node.name)}</div>
                    <div class="email-subject"><b>Subject:</b> ${escapeHtml(node.subject || '(no subject)')}</div>
                    <div class="email-cta">Click to preview →</div>`;
  card.addEventListener('click', () => openPreview(node, flowName));
  return card;
}

function triggerNode(trigger){
  const wrap = document.createElement('div');
  wrap.className = 'seq';
  const card = document.createElement('div');
  card.className = 'trigger';
  card.innerHTML = `<div class="trigger-label">Trigger</div><div class="trigger-name">${escapeHtml(trigger.label)}</div>`;
  wrap.appendChild(card);
  return wrap;
}

function connector(){ const c = document.createElement('div'); c.className = 'connector'; return c; }

function openPreview(node, flowName){
  if (!node.file){ alert('Template file missing for ' + node.message_id); return; }
  document.getElementById('modal-flow').textContent = flowName;
  document.getElementById('modal-name').textContent = node.name;
  document.getElementById('modal-subject').textContent = node.subject || '(no subject)';
  document.getElementById('modal-frame').src = 'templates/' + node.file;
  document.getElementById('modal-open').href = 'templates/' + node.file;
  document.getElementById('modal-download').href = 'templates/' + node.file;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modal-frame').src = 'about:blank';
}
document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function escapeHtml(s){ return String(s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
</script>
</body>
</html>
