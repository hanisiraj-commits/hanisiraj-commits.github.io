<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="utf-8">
<title>Steak King UK — Live Email Flows</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f7f5f0;--canvas:#ece9e1;--ink:#0f0f0f;--ink-soft:#3a3a3a;--muted:#8a877e;
    --line:#d8d4ca;--card:#fff;
    --accent:#b91c1c;--accent-soft:#fef0f0;
    --live:#16a34a;--live-soft:#dcfce7;
    --draft:#d97706;--draft-soft:#fef3c7;
    --manual:#7c3aed;--manual-soft:#ede9fe;
    --delay-bg:#fff8e0;--delay-ink:#7a5e00;--delay-border:#f0e4a8;
    --split-bg:#eef4ff;--split-ink:#1e3a8a;--split-border:#bfd5f5;
    --connector:#c0bcb4;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;letter-spacing:-.005em}
  .layout{display:grid;grid-template-columns:340px 1fr;height:100vh}

  /* ============ SIDEBAR ============ */
  .sidebar{background:#0d0d0d;color:#f5f3ee;overflow-y:auto;border-right:1px solid #000;display:flex;flex-direction:column}
  .brand{padding:24px 24px 18px;border-bottom:1px solid #1f1f1f}
  .brand h1{margin:0;font-size:18px;font-weight:800;letter-spacing:-.02em}
  .brand .sub{font-size:11.5px;color:#8a8a8a;margin-top:3px;letter-spacing:.005em}
  .meta-bar{padding:14px 24px;background:#000;border-bottom:1px solid #1f1f1f;display:flex;gap:14px;font-size:11px}
  .meta-chip{display:flex;flex-direction:column;gap:1px}
  .meta-chip .n{font-size:18px;font-weight:800;line-height:1}
  .meta-chip .l{color:#8a8a8a;font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-top:3px}
  .meta-chip.live .n{color:#4ade80}
  .meta-chip.draft .n{color:#fbbf24}
  .meta-chip.manual .n{color:#c4b5fd}
  .flows-list{padding:14px 12px 40px;display:flex;flex-direction:column;gap:6px;flex:1}
  .flow-item{padding:12px 14px;border-radius:10px;cursor:pointer;transition:all .15s;border:1px solid transparent;background:#1a1a1a}
  .flow-item:hover{background:#252525}
  .flow-item.active{background:var(--accent);border-color:var(--accent);box-shadow:0 4px 14px rgba(185,28,28,.3)}
  .flow-item-name{font-size:13px;font-weight:700;line-height:1.3;margin-bottom:5px}
  .flow-item-meta{font-size:10.5px;color:#999;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .flow-item.active .flow-item-meta{color:#ffd0d6}
  .flow-status-mini{display:inline-flex;align-items:center;gap:3px}
  .flow-status-mini::before{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;background:#4ade80}
  .flow-status-mini.draft::before{background:#fbbf24}
  .flow-status-mini.manual::before{background:#c4b5fd}

  /* ============ CANVAS ============ */
  .main{position:relative;background:var(--canvas);overflow:auto;height:100vh}
  .main::before{content:"";position:fixed;inset:0;background-image:radial-gradient(circle at 1px 1px,#d0ccc1 1px,transparent 1px);background-size:18px 18px;opacity:.6;pointer-events:none;z-index:0}
  .canvas-header{position:sticky;top:0;background:rgba(247,245,240,.94);backdrop-filter:blur(10px);padding:22px 36px 18px;border-bottom:1px solid var(--line);z-index:10}
  .canvas-header h2{margin:0;font-size:22px;font-weight:800;letter-spacing:-.02em}
  .canvas-header .sub{font-size:12px;color:var(--muted);margin-top:4px;font-weight:500}
  .canvas-header .pills{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .header-pill{font-size:10.5px;font-weight:600;padding:5px 10px;border-radius:6px;background:#fff;border:1px solid var(--line);color:var(--ink-soft);display:inline-flex;align-items:center;gap:4px}
  .header-pill.warn{background:#fef3c7;border-color:#fde68a;color:#92400e}
  .header-pill.live{background:var(--live-soft);border-color:#bbf7d0;color:#166534}

  .canvas{padding:50px 36px 100px;display:flex;flex-direction:column;align-items:center;min-width:max-content;position:relative;z-index:1}

  .seq{display:flex;flex-direction:column;align-items:center;gap:0}
  .connector{width:2px;height:34px;background:var(--connector);flex:none}

  /* ============ TRIGGER ============ */
  .trigger-card{background:linear-gradient(135deg,#0f0f0f 0%,#2a2a2a 100%);color:#fff;padding:16px 26px;border-radius:14px;min-width:320px;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.18)}
  .trigger-label{font-size:10px;color:#a0a0a0;text-transform:uppercase;letter-spacing:.12em;font-weight:700;margin-bottom:6px}
  .trigger-name{font-size:15px;font-weight:700;letter-spacing:-.01em}

  /* ============ EMAIL CARD ============ */
  .email-card{background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:14px 18px;width:380px;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.04);position:relative}
  .email-card:hover{border-color:var(--accent);box-shadow:0 8px 24px rgba(185,28,28,.12);transform:translateY(-2px)}
  .email-card.draft{background:#fafafa;border-style:dashed;opacity:.92}
  .email-card.manual{background:#faf7ff}
  .email-card-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}
  .tag-group{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
  .tag{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:3px 7px;border-radius:4px;display:inline-flex;align-items:center;gap:3px}
  .tag.send{background:var(--accent-soft);color:var(--accent)}
  .tag.ab{background:var(--manual-soft);color:var(--manual)}
  .tag.status-live{background:var(--live-soft);color:#166534}
  .tag.status-live::before{content:"●";color:var(--live)}
  .tag.status-draft{background:var(--draft-soft);color:#92400e}
  .tag.status-draft::before{content:"◐";color:var(--draft)}
  .tag.status-manual{background:var(--manual-soft);color:var(--manual)}
  .tag.status-manual::before{content:"⏸";color:var(--manual)}
  .email-name{font-size:13.5px;font-weight:700;margin:0 0 4px;color:var(--ink);line-height:1.3}
  .email-subject{font-size:12.5px;color:var(--ink-soft);line-height:1.4;margin-bottom:8px}
  .email-subject b{color:var(--muted);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.06em;margin-right:5px}
  .email-cta{font-size:11px;color:var(--accent);font-weight:600;display:inline-flex;align-items:center;gap:4px}

  /* ============ DELAY ============ */
  .delay-pill{background:var(--delay-bg);color:var(--delay-ink);padding:7px 14px;border-radius:18px;font-size:11.5px;font-weight:600;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--delay-border)}

  /* ============ SPLIT ============ */
  .split-card{background:var(--split-bg);color:var(--split-ink);border:1.5px solid var(--split-border);padding:12px 20px;border-radius:10px;max-width:560px;text-align:center;display:flex;flex-direction:column;gap:3px}
  .split-title{font-size:11.5px;font-weight:700;display:inline-flex;align-items:center;gap:6px;justify-content:center;text-transform:uppercase;letter-spacing:.04em}
  .split-condition{font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:500;opacity:.85;line-height:1.4}

  /* Branches */
  .branches{display:grid;grid-auto-columns:minmax(380px,1fr);grid-auto-flow:column;gap:36px;position:relative;padding-top:38px}
  .branches::before{content:"";position:absolute;top:0;left:50%;width:2px;height:18px;background:var(--connector);transform:translateX(-50%)}
  /* horizontal connector across branches */
  .branches::after{content:"";position:absolute;top:18px;height:2px;background:var(--connector);left:calc(50% / var(--n,2));right:calc(50% / var(--n,2))}
  .branches[data-single]::after,.branches[data-single]::before{display:none}
  .branch-col{display:flex;flex-direction:column;align-items:center;position:relative;padding-top:18px;min-width:0}
  .branch-col::before{content:"";position:absolute;top:0;left:50%;width:2px;height:18px;background:var(--connector);transform:translateX(-50%)}
  .branches[data-single] .branch-col::before{top:-18px}
  .branch-label{background:#fff;border:1.5px solid var(--line);color:var(--split-ink);font-size:11px;font-weight:700;padding:6px 14px;border-radius:18px;margin-bottom:18px;white-space:nowrap;max-width:300px;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.005em}
  .branch-label.yes{background:#dcfce7;border-color:#bbf7d0;color:#166534}
  .branch-label.no{background:#fee2e2;border-color:#fecaca;color:#991b1b}
  .end-cap{margin-top:14px;background:transparent;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-weight:700;padding:6px 12px;border:1px dashed var(--line);border-radius:18px}

  /* ============ MODAL ============ */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:center;justify-content:center;padding:30px}
  .modal-overlay.open{display:flex}
  .modal{background:var(--canvas);width:100%;max-width:1100px;max-height:96vh;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.4)}
  .modal-header{background:#fff;padding:18px 24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;gap:14px}
  .modal-meta{flex:1;min-width:0}
  .modal-flow{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:700}
  .modal-name{font-size:16px;font-weight:800;margin:3px 0 6px;letter-spacing:-.01em}
  .modal-subject{font-size:12.5px;color:var(--ink-soft);line-height:1.45;display:flex;flex-direction:column;gap:3px}
  .modal-subject .lbl{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.06em;font-weight:700}
  .modal-status-row{display:flex;gap:5px;margin-top:8px;align-items:center}
  .modal-actions{display:flex;gap:6px;flex:none;align-items:center}
  .btn{font-size:11.5px;font-weight:600;background:var(--ink);color:#fff;border:0;padding:7px 12px;border-radius:6px;cursor:pointer;text-decoration:none;display:inline-block;letter-spacing:-.005em}
  .btn-ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn-ghost:hover{background:#f5f3ee}
  .btn-close{background:transparent;color:var(--muted);font-size:24px;line-height:1;padding:0 8px;cursor:pointer;border:0;font-weight:300}
  .modal-body{flex:1;overflow-y:auto;padding:22px;background:var(--canvas);display:flex;justify-content:center}
  .device{background:#fff;width:100%;max-width:720px;box-shadow:0 6px 30px rgba(0,0,0,.10);border-radius:8px;overflow:hidden}
  iframe{width:100%;border:0;display:block;background:#fff;min-height:600px;transition:height .2s}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <h1>Steak King UK</h1>
      <div class="sub">Email flows · pulled live from Klaviyo</div>
    </div>
    <div class="meta-bar" id="meta-bar"></div>
    <div class="flows-list" id="flows-list"></div>
  </aside>
  <main class="main">
    <div class="canvas-header">
      <h2 id="flow-title">Select a flow</h2>
      <div class="sub" id="flow-sub"></div>
      <div class="pills" id="flow-pills"></div>
    </div>
    <div class="canvas" id="canvas"></div>
  </main>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-meta">
        <div class="modal-flow" id="modal-flow"></div>
        <div class="modal-name" id="modal-name"></div>
        <div class="modal-subject">
          <span class="lbl">Subject</span>
          <span id="modal-subject"></span>
        </div>
        <div class="modal-status-row" id="modal-status-row"></div>
      </div>
      <div class="modal-actions">
        <a class="btn-ghost btn" id="modal-open" target="_blank">Open in new tab ↗</a>
        <a class="btn" id="modal-download" download>Download .html</a>
        <button class="btn-close" onclick="closeModal()" aria-label="Close">×</button>
      </div>
    </div>
    <div class="modal-body"><div class="device"><iframe id="modal-frame" loading="lazy"></iframe></div></div>
  </div>
</div>

<script>
let DATA = null;

fetch('flow-graph.json').then(r => r.json()).then(d => { DATA = d; renderSidebar(); });

function statusToClass(s){ return s === 'live' ? 'status-live' : s === 'draft' ? 'status-draft' : s === 'manual' ? 'status-manual' : ''; }
function statusLabel(s){ return s === 'live' ? 'LIVE' : s === 'draft' ? 'DRAFT' : s === 'manual' ? 'MANUAL' : (s || 'UNKNOWN').toUpperCase(); }

function countByStatus(nodes, out){
  for (const n of nodes){
    if (n.kind === 'email' || n.kind === 'email_ab'){
      out[n.status] = (out[n.status] || 0) + 1;
    } else if (n.kind === 'split'){
      for (const b of n.branches) countByStatus(b.nodes, out);
    }
  }
}

function renderSidebar(){
  const list = document.getElementById('flows-list');
  // meta bar
  const t = DATA.totals || {};
  document.getElementById('meta-bar').innerHTML = `
    <div class="meta-chip"><div class="n">${DATA.flows.length}</div><div class="l">Flows</div></div>
    <div class="meta-chip live"><div class="n">${t.live||0}</div><div class="l">Live</div></div>
    <div class="meta-chip draft"><div class="n">${t.draft||0}</div><div class="l">Draft</div></div>
    ${t.manual ? `<div class="meta-chip manual"><div class="n">${t.manual}</div><div class="l">Manual</div></div>` : ''}
  `;
  list.innerHTML = '';
  DATA.flows.forEach((f, idx) => {
    const c = f.email_counts || {};
    const chips = [];
    if (c.live) chips.push(`<span class="flow-status-mini">${c.live} live</span>`);
    if (c.draft) chips.push(`<span class="flow-status-mini draft">${c.draft} draft</span>`);
    if (c.manual) chips.push(`<span class="flow-status-mini manual">${c.manual} manual</span>`);
    const el = document.createElement('div');
    el.className = 'flow-item';
    el.dataset.idx = idx;
    el.innerHTML = `<div class="flow-item-name">${escapeHtml(f.name)}</div>
                    <div class="flow-item-meta">${chips.join(' · ')}</div>`;
    el.addEventListener('click', () => selectFlow(idx));
    list.appendChild(el);
  });
  selectFlow(0);
}

function selectFlow(idx){
  document.querySelectorAll('.flow-item').forEach(el => el.classList.toggle('active', +el.dataset.idx === idx));
  const f = DATA.flows[idx];
  document.getElementById('flow-title').textContent = f.name;
  const c = f.email_counts || {};
  const total = (c.live||0) + (c.draft||0) + (c.manual||0);
  document.getElementById('flow-sub').textContent = `Trigger: ${f.trigger.label} · ${total} email${total!==1?'s':''}`;
  const pills = [];
  if (c.live) pills.push(`<span class="header-pill live">● ${c.live} live</span>`);
  if (c.draft) pills.push(`<span class="header-pill warn">◐ ${c.draft} draft</span>`);
  if (c.manual) pills.push(`<span class="header-pill warn">⏸ ${c.manual} manual</span>`);
  if (f.profile_filter_summary) pills.push(`<span class="header-pill warn">⛔ Entry filter: ${escapeHtml(f.profile_filter_summary)}</span>`);
  document.getElementById('flow-pills').innerHTML = pills.join('');
  renderCanvas(f);
}

function renderCanvas(flow){
  const c = document.getElementById('canvas');
  c.innerHTML = '';
  c.appendChild(triggerNode(flow.trigger));
  c.appendChild(connector());
  renderSequence(c, flow.tree, flow.name, true);
}

function renderSequence(parent, seq, flowName, addEndCap){
  if (seq.length === 0){
    if (addEndCap){
      const end = document.createElement('div');
      end.className = 'end-cap';
      end.textContent = '— End —';
      parent.appendChild(end);
    }
    return;
  }
  seq.forEach((node, i) => {
    parent.appendChild(renderNode(node, flowName));
    const isLast = i === seq.length - 1;
    if (node.kind === 'split'){
      // Splits handle their own descent
      return;
    }
    if (isLast){
      if (addEndCap){
        parent.appendChild(connector());
        const end = document.createElement('div');
        end.className = 'end-cap';
        end.textContent = '— End —';
        parent.appendChild(end);
      }
    } else {
      parent.appendChild(connector());
    }
  });
}

function renderNode(node, flowName){
  if (node.kind === 'email' || node.kind === 'email_ab'){
    return emailCard(node, flowName, node.kind === 'email_ab');
  } else if (node.kind === 'delay'){
    const d = document.createElement('div');
    d.className = 'delay-pill';
    d.innerHTML = `<span>⏱</span> Wait ${escapeHtml(node.label)}`;
    return d;
  } else if (node.kind === 'split'){
    return splitNode(node, flowName);
  } else {
    const u = document.createElement('div');
    u.className = 'delay-pill';
    u.style.background='#fee';
    u.textContent = 'Unknown: ' + (node.kind || node.type || '?');
    return u;
  }
}

function splitNode(node, flowName){
  const wrap = document.createElement('div');
  wrap.className = 'seq';
  const card = document.createElement('div');
  card.className = 'split-card';
  const t = node.split_type === 'trigger-split' ? 'Trigger split' : 'Conditional split';
  card.innerHTML = `<div class="split-title">⇆ ${t}</div>${node.condition ? `<div class="split-condition">${escapeHtml(node.condition)}</div>` : ''}`;
  wrap.appendChild(card);
  // Branches container
  const nonEmpty = node.branches.filter(b => b.nodes.length > 0);
  if (nonEmpty.length === 0){
    const c = connector();
    wrap.appendChild(c);
    const end = document.createElement('div');
    end.className = 'end-cap';
    end.textContent = '— Dead-end split (both branches empty) —';
    wrap.appendChild(end);
    return wrap;
  }
  const br = document.createElement('div');
  br.className = 'branches';
  br.style.setProperty('--n', String(nonEmpty.length));
  if (nonEmpty.length === 1) br.dataset.single = '';
  nonEmpty.forEach(b => {
    const col = document.createElement('div');
    col.className = 'branch-col';
    const lbl = document.createElement('div');
    lbl.className = 'branch-label';
    // Choose yes/no class for boolean labels
    if (b.value === true && b.label === 'Yes') lbl.classList.add('yes');
    else if (b.value === false && b.label === 'No') lbl.classList.add('no');
    lbl.textContent = b.label;
    col.appendChild(lbl);
    const inner = document.createElement('div');
    inner.className = 'seq';
    renderSequence(inner, b.nodes, flowName, true);
    col.appendChild(inner);
    br.appendChild(col);
  });
  wrap.appendChild(br);
  return wrap;
}

function emailCard(node, flowName, isAB){
  const card = document.createElement('div');
  card.className = 'email-card ' + (node.status === 'draft' ? 'draft' : node.status === 'manual' ? 'manual' : '');
  const statusTag = `<span class="tag ${statusToClass(node.status)}">${statusLabel(node.status)}</span>`;
  const abTag = isAB ? `<span class="tag ab">A/B Test</span>` : '';
  card.innerHTML = `
    <div class="email-card-head">
      <div class="tag-group">
        <span class="tag send">Send Email</span>
        ${abTag}
      </div>
      ${statusTag}
    </div>
    <div class="email-name">${escapeHtml(node.name)}</div>
    <div class="email-subject"><b>Subject</b>${escapeHtml(node.subject || '(no subject)')}</div>
    <div class="email-cta">Click to preview →</div>`;
  card.addEventListener('click', () => openPreview(node, flowName));
  return card;
}

function triggerNode(trigger){
  const wrap = document.createElement('div');
  wrap.className = 'seq';
  const card = document.createElement('div');
  card.className = 'trigger-card';
  card.innerHTML = `<div class="trigger-label">Flow Trigger</div><div class="trigger-name">${escapeHtml(trigger.label)}</div>`;
  wrap.appendChild(card);
  return wrap;
}

function connector(){ const c = document.createElement('div'); c.className = 'connector'; return c; }

function openPreview(node, flowName){
  if (!node.file){ alert('Template file missing'); return; }
  document.getElementById('modal-flow').textContent = flowName;
  document.getElementById('modal-name').textContent = node.name;
  document.getElementById('modal-subject').textContent = node.subject || '(no subject)';
  document.getElementById('modal-status-row').innerHTML = `<span class="tag ${statusToClass(node.status)}">${statusLabel(node.status)}</span>`;
  document.getElementById('modal-frame').src = 'templates/' + node.file;
  document.getElementById('modal-open').href = 'templates/' + node.file;
  document.getElementById('modal-download').href = 'templates/' + node.file;
  document.getElementById('modal').classList.add('open');
}

// Auto-size iframe to content after load
document.getElementById('modal-frame').addEventListener('load', function(){
  try {
    const doc = this.contentDocument || this.contentWindow.document;
    if (doc && doc.body) {
      const h = Math.max(doc.body.scrollHeight, doc.documentElement.scrollHeight);
      this.style.height = h + 'px';
    }
  } catch(e){}
});

function closeModal(){
  document.getElementById('modal').classList.remove('open');
  var fr = document.getElementById('modal-frame'); fr.style.height = '600px'; fr.src = 'about:blank';
}
document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function escapeHtml(s){ return String(s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
</script>
</body>
</html>
